<!-- ==========================================================
     File: doctorDashboard.html
     Purpose:
     Displays the Doctor Dashboard interface where doctors can
     search patients, filter appointments, and access patient
     prescriptions.
========================================================== -->

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- ======================================================
         Character Encoding
         Ensures proper rendering of all characters and symbols.
    ======================================================= -->
    <meta charset="UTF-8">

    <!-- ======================================================
         Favicon
         Displays the application logo in the browser tab.
    ======================================================= -->
    <link rel="icon"
          type="image/png"
          th:href="@{/assets/images/logo/logo.png}" />

    <!-- ======================================================
         Page Title
         Appears in the browser tab.
    ======================================================= -->
    <title>Doctor Dashboard</title>

    <!-- ======================================================
         CSS Stylesheets

         1. adminDashboard.css
            - Shared dashboard layout and components.

         2. doctorDashboard.css
            - Doctor-specific styling.

         3. style.css
            - Common styles used throughout the application.
    ======================================================= -->
    <link rel="stylesheet" th:href="@{/css/adminDashboard.css}">
    <link rel="stylesheet" th:href="@{/css/doctorDashboard.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- ======================================================
         JavaScript Files

         defer
         -----
         Loads scripts after HTML parsing to improve performance.

         render.js
         - Handles common rendering functionality.

         util.js
         - Contains reusable helper functions.

         header.js
         - Dynamically loads the header.

         footer.js
         - Dynamically loads the footer.

         doctorDashboard.js
         - Contains Doctor Dashboard functionality.
         - Loaded as a JavaScript module.
    ======================================================= -->
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>
    <script th:src="@{/js/header.js}" defer></script>
    <script th:src="@{/js/footer.js}" defer></script>
    <script type="module"
            th:src="@{/js/doctorDashboard.js}"
            defer></script>

</head>

<!-- ==========================================================
     Body

     onload="renderContent()"
     ------------------------
     Calls the renderContent() function after the page finishes
     loading.
========================================================== -->
<body onload="renderContent()">

    <!-- ======================================================
         Main Container

         Wraps the complete Doctor Dashboard.
    ======================================================= -->
    <div class="container">

        <!-- ==================================================
             Wrapper

             Organizes the page structure.
        =================================================== -->
        <div class="wrapper">

            <!-- ==============================================
                 Header Placeholder

                 Header content is inserted dynamically using
                 JavaScript.
            =============================================== -->
            <div id="header"></div>

            <!-- ==============================================
                 Main Content Area

                 Contains all dashboard components.
            =============================================== -->
            <div class="main-content">

                <!-- ==========================================
                     Search Section

                     Allows doctors to search patients,
                     appointments, or other custom data.
                =========================================== -->
                <input
                    type="text"
                    id="searchBar"
                    class="searchBar"
                    placeholder="Search Bar for custom output"
                />

                <!-- ==========================================
                     Filter Controls

                     todayButton
                     -----------
                     Displays today's appointments.

                     datePicker
                     ----------
                     Filters appointments by selected date.
                =========================================== -->
                <div class="filter-container">

                    <button id="todayButton">
                        Today's Appointments
                    </button>

                    <input
                        type="date"
                        id="datePicker"
                    />

                </div>

                <!-- ==========================================
                     Patient Table

                     Displays patient information and allows
                     doctors to access prescriptions.

                     Columns:
                     - Patient ID
                     - Name
                     - Phone Number
                     - Email
                     - Prescription
                =========================================== -->
                <table class="patient-table">

                    <thead>
                        <tr>
                            <th>Patient ID</th>
                            <th>Name</th>
                            <th>Phone No.</th>
                            <th>Email</th>
                            <th>Prescription</th>
                        </tr>
                    </thead>

                    <!-- ======================================
                         Dynamic Table Body

                         Patient records are inserted here
                         using JavaScript.
                    ======================================= -->
                    <tbody id="patientTableBody">
                    </tbody>

                </table>

            </div>

            <!-- ==============================================
                 Footer Placeholder

                 Footer is loaded dynamically using JavaScript.
            =============================================== -->
            <div id="footer"></div>

        </div>
        <!-- End Wrapper -->

    </div>
    <!-- End Container -->

</body>

</html>

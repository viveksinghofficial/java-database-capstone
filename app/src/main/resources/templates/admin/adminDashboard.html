<!-- adminDashboard.html -->

<!-- ============================================================
     File: adminDashboard.html

     Description:
     Admin Dashboard page for the Smart Clinic Management System.

     Purpose:
     - Displays all doctor information.
     - Provides search functionality.
     - Allows filtering by time and specialty.
     - Loads reusable header and footer dynamically.
     - Displays doctor details using dynamic cards.
     - Uses a modal for viewing/editing additional information.
============================================================= -->

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <!-- ========================================================
         Basic Page Metadata
    ========================================================= -->

    <!-- Character encoding for universal text support -->
    <meta charset="UTF-8">

    <!-- Responsive viewport for mobile and desktop devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Browser tab icon -->
    <link rel="icon"
          type="image/png"
          th:href="@{/assets/images/logo/logo.png}">

    <!-- Browser page title -->
    <title>Admin Dashboard</title>


    <!-- ========================================================
         CSS Stylesheets
    ========================================================= -->

    <!-- Dashboard-specific styling -->
    <link rel="stylesheet"
          th:href="@{/css/adminDashboard.css}">

    <!-- Global styles used throughout the application -->
    <link rel="stylesheet"
          th:href="@{/css/style.css}">


    <!-- ========================================================
         Global JavaScript Files
         Loaded with defer to avoid blocking page rendering.
    ========================================================= -->

    <!-- Handles common rendering functions -->
    <script th:src="@{/js/render.js}" defer></script>

    <!-- Utility/helper functions -->
    <script th:src="@{/js/util.js}" defer></script>

    <!-- Dynamically inserts the website header -->
    <script th:src="@{/js/header.js}" defer></script>

    <!-- Dynamically inserts the website footer -->
    <script th:src="@{/js/footer.js}" defer></script>

</head>

<!-- ============================================================
     Body
     renderContent() executes once the page finishes loading.
============================================================= -->
<body onload="renderContent()">

    <!-- Main page container -->
    <div class="container">

        <!-- Wrapper for consistent spacing and alignment -->
        <div class="wrapper">

            <!-- ================================================
                 Dynamic Header
                 Content inserted through JavaScript.
            ================================================= -->
            <div id="header"></div>


            <!-- ================================================
                 Main Dashboard Section
            ================================================= -->
            <main class="main-content">

                <!-- ============================================
                     Search and Filter Controls
                ============================================= -->
                <section class="dashboard-controls">

                    <!-- Search doctors by name or keyword -->
                    <input
                        type="text"
                        id="searchBar"
                        placeholder="Search doctors...">

                    <!-- Filter doctors by available session -->
                    <select id="timeFilter">
                        <option value="">All Times</option>
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>

                    <!-- Filter doctors by medical specialty -->
                    <select id="specialtyFilter">
                        <option value="">All Specialties</option>
                        <option value="Cardiologist">Cardiologist</option>
                        <option value="Dentist">Dentist</option>
                        <option value="Dermatologist">Dermatologist</option>
                        <option value="Neurologist">Neurologist</option>
                        <option value="Orthopedic">Orthopedic</option>
                        <option value="Pediatrician">Pediatrician</option>
                        <option value="Psychiatrist">Psychiatrist</option>
                        <option value="General Physician">General Physician</option>
                    </select>

                </section>


                <!-- ============================================
                     Dynamic Doctor Cards
                     JavaScript injects doctor information here.
                ============================================= -->
                <div id="content"></div>

            </main>


            <!-- ================================================
                 Dynamic Footer
                 Loaded through JavaScript.
            ================================================= -->
            <div id="footer"></div>

        </div>

    </div>


    <!-- ========================================================
         Modal Window
         Used for displaying detailed doctor information,
         forms, or other popup content.
    ========================================================= -->
    <div id="modal" class="modal">

        <div class="modal-content">

            <!-- Close button -->
            <span class="close">&times;</span>

            <!-- Dynamic modal body -->
            <div id="modal-body"></div>

        </div>

    </div>


    <!-- ========================================================
         Page-Specific JavaScript Modules
    ========================================================= -->

    <!-- Handles dashboard functionality -->
    <script type="module"
            th:src="@{/js/adminDashboard.js}"
            defer></script>

    <!-- Creates and renders doctor cards -->
    <script type="module"
            th:src="@{/js/doctorCard.js}"
            defer></script>

</body>

</html>

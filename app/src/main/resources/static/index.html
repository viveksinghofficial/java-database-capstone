<!-- ==========================================================
     File: index.html
     Role Selection Page
     Allows users to choose a role (Admin, Patient, Doctor)
     and opens the appropriate login modal.
     ========================================================== -->

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Select Role</title>

    <!-- Favicon -->
    <link rel="icon" href="./assets/images/logo/Logo.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- Utility Scripts -->
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>

    <!-- Shared Components -->
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>

<body>

    <!-- Main Page Container -->
    <div class="container">

        <!-- Layout Wrapper -->
        <div class="wrapper">

            <!-- Dynamic Header -->
            <div id="header"></div>

            <!-- Main Content -->
            <main class="main-content">

                <!-- Page Heading -->
                <h2>Select Your Role</h2>

                <!-- Role Selection Buttons -->
                <button id="admin-btn">Admin</button>
                <button id="patient-btn">Patient</button>
                <button id="doctor-btn">Doctor</button>

            </main>

            <!-- Dynamic Footer -->
            <div id="footer"></div>

        </div>

    </div>

    <!-- ======================================================
         Login Modal
         Dynamic content is injected through JavaScript.
         ====================================================== -->
    <div id="modal" class="modal">

        <!-- Modal Content -->
        <div class="modal-content">

            <!-- Close Button -->
            <button id="close-modal" class="close-btn">&times;</button>

            <!-- Dynamic Modal Body -->
            <div id="modal-body"></div>

        </div>

    </div>

    <!-- Page-Specific Module -->
    <script type="module" src="./js/services/index.js"></script>

</body>

</html>
